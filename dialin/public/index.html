<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Espresso Dialling</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .view { display: none; }
        .view.active { display: block; animation: fadeIn 0.2s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        ::-webkit-scrollbar { width: 0px; background: transparent; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans h-screen flex flex-col overscroll-none select-none">

    <header class="bg-slate-900 text-white pt-12 pb-4 px-4 sticky top-0 z-10 shadow-md rounded-b-2xl">
        <h1 class="text-2xl font-bold text-center tracking-wide" id="header-title">Machine Programs</h1>
    </header>

    <nav class="bg-white/90 backdrop-blur-md border-t border-slate-200 fixed bottom-0 w-full pb-safe pt-2 px-2 z-20">
        <div class="flex justify-around items-center h-16 max-w-md mx-auto">
            <button onclick="switchView('home', 'Machine Programs')" id="nav-home" class="nav-btn flex flex-col items-center justify-center w-16 h-full text-blue-600 transition">
                <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
                <span class="text-[10px] font-bold">Home</span>
            </button>
            <button onclick="switchView('workflow', 'Dial-in Workflow')" id="nav-workflow" class="nav-btn flex flex-col items-center justify-center w-16 h-full text-slate-400 transition">
                <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"></path></svg>
                <span class="text-[10px] font-bold">Dial-in</span>
            </button>
            <button onclick="switchView('recipes', 'Recipe Log')" id="nav-recipes" class="nav-btn flex flex-col items-center justify-center w-16 h-full text-slate-400 transition">
                <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"></path></svg>
                <span class="text-[10px] font-bold">Log</span>
            </button>
            <button onclick="switchView('quick', 'Quick Calc')" id="nav-quick" class="nav-btn flex flex-col items-center justify-center w-16 h-full text-slate-400 transition">
                <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 14h.01M12 14h.01M15 11h.01M12 11h.01M9 11h.01M7 21h10a2 2 0 002-2V5a2 2 0 00-2-2H7a2 2 0 00-2 2v14a2 2 0 002 2z"></path></svg>
                <span class="text-[10px] font-bold">Calc</span>
            </button>
        </div>
    </nav>

    <main class="flex-1 overflow-y-auto p-4 pb-24 w-full max-w-md mx-auto">
        
        <div id="view-home" class="view active space-y-4">
            <p class="text-slate-500 text-sm mb-2 text-center">Currently assigned coffees</p>
            <div class="space-y-4" id="programs-container">
            </div>
        </div>

        <div id="view-workflow" class="view space-y-6">
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 space-y-5">
                
                <div>
                    <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">Coffee Name</label>
                    <input type="text" id="wf-coffee" class="w-full text-lg p-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none transition" placeholder="e.g. Showcase Blend">
                </div>
                
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">Dose (g)</label>
                        <input type="number" step="0.1" inputmode="decimal" id="wf-dose" onblur="formatInput(this, 'dose')" class="w-full text-lg p-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none transition bg-slate-50">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">Yield (g)</label>
                        <input type="number" step="0.5" inputmode="decimal" id="wf-yield" onblur="formatInput(this, 'yield')" class="w-full text-lg p-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none transition bg-slate-50">
                    </div>
                </div>
                
                <div>
                    <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">Measured Strength (%)</label>
                    <input type="number" step="0.01" inputmode="decimal" id="wf-strength" onblur="formatInput(this, 'other')" class="w-full text-lg p-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none transition bg-slate-50" placeholder="9.43">
                </div>

                
                <div class="grid grid-cols-2 gap-4 pt-3 border-t border-slate-100 mt-2">
                        <div>
                            <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">Target Str %</label>
                            <input type="number" step="0.01" inputmode="decimal" id="wf-target-strength" value="9.30" onblur="formatInput(this, 'other')" class="w-full p-3 rounded-xl border border-slate-200 bg-slate-50">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">Target TDS (g)</label>
                            <input type="number" step="0.01" inputmode="decimal" id="wf-target-tds" value="4.41" onblur="formatInput(this, 'other')" class="w-full p-3 rounded-xl border border-slate-200 bg-slate-50">
                        </div>
                        <div class="flex gap-3 col-span-2">
                            <button onclick="setText(4.41, 8.50, 'wf-target-tds', 'wf-target-strength')" class="flex-1 bg-white active:bg-slate-100 text-blue-600 border border-blue-200 font-bold py-4 rounded-xl shadow-sm transition">Single Origin Reccomended Recipe</button>
                            <button onclick="setText(4.41, 9.30, 'wf-target-tds', 'wf-target-strength')" class="flex-1 bg-white active:bg-slate-100 text-blue-600 border border-blue-200 font-bold py-4 rounded-xl shadow-sm transition">Blend Recommended Recipe</button>
                        </div>
                </div>
                

                <button onclick="calculateWorkflow()" class="w-full bg-slate-900 active:bg-slate-700 text-white font-bold text-lg py-4 rounded-xl shadow-lg transition">Calculate</button>
            </div>

            <div id="wf-results" class="hidden bg-blue-50 p-5 rounded-2xl shadow-sm border border-blue-100">
                <div class="flex justify-between items-center mb-4">
                    <div>
                        <p class="text-xs text-blue-500 uppercase font-bold tracking-wider">Actual Ext</p>
                        <p class="text-xl font-bold text-slate-800" id="wf-actual-ext"></p>
                    </div>
                    <div class="text-right">
                        <p class="text-xs text-blue-500 uppercase font-bold tracking-wider">Actual TDS</p>
                        <p class="text-xl font-bold text-slate-800"><span id="wf-actual-tds"></span>g</p>
                    </div>
                </div>
                
                <div class="bg-white p-4 rounded-xl border border-blue-100 mb-5">
                    <h3 class="text-xs text-green-600 uppercase font-bold tracking-wider text-center mb-3">Recommended Recipe</h3>
                    <div class="flex justify-around text-center">
                        <div>
                            <p class="text-3xl font-black text-slate-900" id="wf-rec-dose"></p>
                            <p class="text-xs text-slate-500">Dose (g)</p>
                        </div>
                        <div class="w-px bg-slate-200"></div>
                        <div>
                            <p class="text-3xl font-black text-slate-900" id="wf-rec-yield"></p>
                            <p class="text-xs text-slate-500">Yield (g)</p>
                        </div>
                    </div>
                </div>

                <div class="flex flex-col gap-3">
                    <button onclick="dialFurther()" class="w-full bg-blue-600 active:bg-blue-700 text-white font-bold py-4 rounded-xl shadow-md transition">Dial Further</button>
                    <button onclick="saveWorkflowRecipe()" class="w-full bg-white active:bg-slate-100 text-blue-600 border border-blue-200 font-bold py-4 rounded-xl shadow-sm transition">Save Recipe</button>
                </div>
            </div>
        </div>

        <div id="view-recipes" class="view">
            <div id="recipes-list" class="space-y-4">
            </div>
        </div>

        <div id="view-quick" class="view space-y-6">
            <div class="bg-slate-900 text-white p-6 rounded-2xl shadow-lg">
                <div class="grid grid-cols-2 gap-y-6 gap-x-4 text-center">
                    <div>
                        <p class="text-xs text-slate-400 uppercase tracking-widest font-semibold mb-1">Rec. Dose</p>
                        <p class="text-3xl font-black text-green-400" id="qc-res-rdose">-</p>
                    </div>
                    <div>
                        <p class="text-xs text-slate-400 uppercase tracking-widest font-semibold mb-1">Rec. Yield</p>
                        <p class="text-3xl font-black text-green-400" id="qc-res-ryield">-</p>
                    </div>
                    <div>
                        <p class="text-xs text-slate-400 uppercase tracking-widest font-semibold mb-1">Actual Ext</p>
                        <p class="text-xl font-bold" id="qc-res-ext">-</p>
                    </div>
                    <div>
                        <p class="text-xs text-slate-400 uppercase tracking-widest font-semibold mb-1">Actual TDS</p>
                        <p class="text-xl font-bold" id="qc-res-tds">-</p>
                    </div>
                </div>
            </div>

            <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 grid grid-cols-3 gap-3">
                <div>
                    <label class="block text-xs font-semibold text-slate-500 text-center mb-2">Dose</label>
                    <input type="number" step="0.1" inputmode="decimal" id="qc-dose" oninput="runQuickCalc()" onblur="formatInput(this, 'dose')" class="w-full text-lg p-3 text-center rounded-xl border border-slate-200 bg-slate-50 outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-500 text-center mb-2">Yield</label>
                    <input type="number" step="0.5" inputmode="decimal" id="qc-yield" oninput="runQuickCalc()" onblur="formatInput(this, 'yield')" class="w-full text-lg p-3 text-center rounded-xl border border-slate-200 bg-slate-50 outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-500 text-center mb-2">Str %</label>
                    <input type="number" step="0.01" inputmode="decimal" id="qc-strength" oninput="runQuickCalc()" onblur="formatInput(this, 'other')" class="w-full text-lg p-3 text-center rounded-xl border border-slate-200 bg-slate-50 outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500">
                </div>
            </div>

            
            <div>
                    <label class="block text-xs font-semibold text-slate-500 mb-1">Target Str %</label>
                    <input type="number" step="0.01" inputmode="decimal" id="qc-t-str" value="9.30" oninput="runQuickCalc()" onblur="formatInput(this, 'other')" class="w-full p-3 rounded-xl border border-slate-200 bg-slate-50 outline-none">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-500 mb-1">Target TDS g</label>
                    <input type="number" step="0.01" inputmode="decimal" id="qc-t-tds" value="4.41" oninput="runQuickCalc()" onblur="formatInput(this, 'other')" class="w-full p-3 rounded-xl border border-slate-200 bg-slate-50 outline-none">
            </div>
            
            
        </div>

    </main>

    <script>
        // --- State Management (localStorage) ---
        // 1. When the app loads, it asks the browser: "Do you have any saved data for this site?"
        let recipes = JSON.parse(localStorage.getItem('coffeeRecipes')) || [];
        let programs = JSON.parse(localStorage.getItem('coffeePrograms')) || {
            'Long Up': null,
            'Down': null,
            'Long Down': null
        };

        // 2. Whenever we change data, we tell the browser: "Overwrite the old saved data with this new data"
        function saveData() {
            localStorage.setItem('coffeeRecipes', JSON.stringify(recipes));
            localStorage.setItem('coffeePrograms', JSON.stringify(programs));
            renderHome();
            renderRecipes();
        }

        // --- Formatting Helper ---
        function formatInput(element, type) {
            let val = parseFloat(element.value);
            if(isNaN(val)) return;
            if (type === 'dose') element.value = val.toFixed(1);
            else if (type === 'yield') element.value = (Math.round(val * 2) / 2).toFixed(1); 
            else if (type === 'other') element.value = val.toFixed(2);
        }

        // --- Core Math Logic ---
        function calculateDialIn(dose, yieldG, strength, targetStr, targetTds) {
            let actualTds = yieldG * (strength / 100);
            let actualExt = (actualTds / dose) * 100;
            let rawRecDose = targetTds / (actualExt / 100);
            let rawRecYield = targetTds / (targetStr / 100);

            return {
                actualTds: actualTds.toFixed(2),
                actualExt: actualExt.toFixed(2),
                recDose: rawRecDose.toFixed(1),
                recYield: (Math.round(rawRecYield * 2) / 2).toFixed(1) 
            };
        }

        // --- Navigation ---
        function switchView(viewId, title) {
            document.getElementById('header-title').innerText = title;
            document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
            document.getElementById('view-' + viewId).classList.add('active');
            
            document.querySelectorAll('.nav-btn').forEach(el => {
                el.classList.remove('text-blue-600');
                el.classList.add('text-slate-400');
            });
            document.getElementById('nav-' + viewId).classList.remove('text-slate-400');
            document.getElementById('nav-' + viewId).classList.add('text-blue-600');

            if(viewId === 'home') renderHome();
            if(viewId === 'recipes') renderRecipes();
        }

        // --- Workflow Actions ---
        let lastCalc = null;

        function calculateWorkflow() {
            let coffee = document.getElementById('wf-coffee').value;
            let dose = parseFloat(document.getElementById('wf-dose').value);
            let yld = parseFloat(document.getElementById('wf-yield').value);
            let str = parseFloat(document.getElementById('wf-strength').value);
            let tStr = parseFloat(document.getElementById('wf-target-strength').value);
            let tTds = parseFloat(document.getElementById('wf-target-tds').value);

            document.activeElement.blur(); 
            if(!coffee || !dose || !yld || !str) return alert("Please fill all recipe fields!");

            lastCalc = calculateDialIn(dose, yld, str, tStr, tTds);
            lastCalc.original = { coffee, dose, yld, str, tStr, tTds };

            document.getElementById('wf-actual-tds').innerText = lastCalc.actualTds;
            document.getElementById('wf-actual-ext').innerText = lastCalc.actualExt + "%";
            document.getElementById('wf-rec-dose').innerText = lastCalc.recDose;
            document.getElementById('wf-rec-yield').innerText = lastCalc.recYield;
            
            let resDiv = document.getElementById('wf-results');
            resDiv.classList.remove('hidden');
            setTimeout(() => { resDiv.scrollIntoView({ behavior: 'smooth', block: 'end' }); }, 100);
        }

        function dialFurther() {
            if(!lastCalc) return;
            document.getElementById('wf-dose').value = lastCalc.recDose;
            document.getElementById('wf-yield').value = lastCalc.recYield;
            document.getElementById('wf-strength').value = ""; 
            document.getElementById('wf-results').classList.add('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function saveWorkflowRecipe() {
            if(!lastCalc) return;
            let newRecipe = {
                id: Date.now(),
                coffee: lastCalc.original.coffee,
                dose: lastCalc.original.dose,
                yield: lastCalc.original.yld,
                strength: lastCalc.original.str,
                ext: lastCalc.actualExt,
                date: new Date().toLocaleDateString()
            };
            recipes.push(newRecipe);
            saveData();
            
            document.getElementById('wf-coffee').value = '';
            document.getElementById('wf-dose').value = '';
            document.getElementById('wf-yield').value = '';
            document.getElementById('wf-strength').value = '';
            document.getElementById('wf-results').classList.add('hidden');
            switchView('recipes', 'Recipe Log');
        }

        function deleteRecipe(recipeId) {
            if (!confirm("Are you sure you want to delete this recipe?")) return;
            recipes = recipes.filter(r => r.id !== recipeId);
            for (let p in programs) {
                if (programs[p] === recipeId) programs[p] = null;
            }
            saveData();
        }

        // --- Rendering Home ---
        function renderHome() {
            let container = document.getElementById('programs-container');
            container.innerHTML = '';
            
            for(let prog in programs) {
                let recipeId = programs[prog];
                let recipe = recipes.find(r => r.id == recipeId);
                let card = document.createElement('div');
                card.className = "bg-white p-5 rounded-2xl shadow-sm border border-slate-100 flex items-center justify-between";
                
                if(recipe) {
                    let dDisplay = parseFloat(recipe.dose).toFixed(1);
                    let yDisplay = parseFloat(recipe.yield).toFixed(1);
                    let sDisplay = parseFloat(recipe.strength).toFixed(2);
                    
                    card.innerHTML = `
                        <div class="flex-1">
                            <span class="inline-block px-2 py-1 bg-blue-100 text-blue-700 text-[10px] font-black uppercase rounded mb-2">${prog}</span>
                            <h3 class="font-bold text-xl text-slate-900 leading-tight">${recipe.coffee}</h3>
                            <p class="text-sm text-slate-500 mt-1">${dDisplay}g &rarr; ${yDisplay}g | ${sDisplay}%</p>
                        </div>
                        <div class="w-12 h-12 bg-blue-50 rounded-full flex items-center justify-center text-blue-500 border border-blue-100">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                        </div>
                    `;
                } else {
                    card.innerHTML = `
                        <div class="flex-1">
                            <span class="inline-block px-2 py-1 bg-slate-100 text-slate-600 text-[10px] font-black uppercase rounded mb-2">${prog}</span>
                            <p class="text-slate-400 italic text-lg">Empty slot</p>
                        </div>
                    `;
                }
                container.appendChild(card);
            }
        }

        // --- Rendering Recipes ---
        function renderRecipes() {
            let container = document.getElementById('recipes-list');
            container.innerHTML = '';
            
            let grouped = {};
            recipes.forEach(r => {
                if(!grouped[r.coffee]) grouped[r.coffee] = [];
                grouped[r.coffee].push(r);
            });

            for(let coffee in grouped) {
                grouped[coffee].sort((a,b) => b.id - a.id);
                let current = grouped[coffee][0];
                let history = grouped[coffee].slice(1);
                
                let block = document.createElement('div');
                block.className = "bg-white p-5 rounded-2xl shadow-sm border border-slate-100";
                
                let cd = parseFloat(current.dose).toFixed(1);
                let cy = parseFloat(current.yield).toFixed(1);
                let cs = parseFloat(current.strength).toFixed(2);
                
                block.innerHTML = `
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="text-xl font-bold text-slate-900">${current.coffee}</h3>
                        <div class="flex items-center gap-3">
                            <span class="text-xs font-semibold text-slate-400 bg-slate-100 px-2 py-1 rounded-full">${current.date}</span>
                            <button onclick="deleteRecipe(${current.id})" class="text-red-400 hover:text-red-600 transition" aria-label="Delete Recipe">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                            </button>
                        </div>
                    </div>
                    
                    <div class="flex justify-between bg-slate-50 p-4 rounded-xl border border-slate-100 mb-4 text-center">
                        <div><p class="text-xs text-slate-400 font-bold uppercase mb-1">Dose</p><p class="font-bold text-lg text-slate-800">${cd}g</p></div>
                        <div class="w-px bg-slate-200"></div>
                        <div><p class="text-xs text-slate-400 font-bold uppercase mb-1">Yield</p><p class="font-bold text-lg text-slate-800">${cy}g</p></div>
                        <div class="w-px bg-slate-200"></div>
                        <div><p class="text-xs text-slate-400 font-bold uppercase mb-1">Str</p><p class="font-bold text-lg text-slate-800">${cs}%</p></div>
                    </div>

                    <div class="flex gap-2">
                        <div class="relative flex-1">
                            <select id="assign-${current.id}" class="w-full h-full appearance-none bg-slate-100 border border-slate-200 text-slate-700 py-3 px-4 rounded-xl font-medium focus:outline-none focus:ring-2 focus:ring-blue-500">
                                <option value="" disabled selected>Assign Button...</option>
                                <option value="Long Up">Long Up</option>
                                <option value="Down">Down</option>
                                <option value="Long Down">Long Down</option>
                            </select>
                            <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-slate-500">
                                <svg class="fill-current h-4 w-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20"><path d="M9.293 12.95l.707.707L15.657 8l-1.414-1.414L10 10.828 5.757 6.586 4.343 8z"/></svg>
                            </div>
                        </div>
                        <button onclick="assignProgram(${current.id})" class="bg-blue-600 active:bg-blue-700 text-white font-bold py-3 px-6 rounded-xl shadow-sm transition">Set</button>
                    </div>

                    ${history.length > 0 ? `
                        <details class="mt-4 border-t border-slate-100 pt-3">
                            <summary class="cursor-pointer text-sm font-semibold text-slate-500 hover:text-slate-700">Archived Recipes (${history.length})</summary>
                            <div class="mt-3 space-y-2">
                                ${history.map(h => `
                                    <div class="flex justify-between items-center text-xs text-slate-600 bg-slate-50 p-2 rounded-lg border border-transparent hover:border-slate-200 transition">
                                        <div class="flex flex-col">
                                            <span class="text-[10px] text-slate-400 mb-0.5">${h.date}</span>
                                            <span class="font-medium text-sm text-slate-700">${parseFloat(h.dose).toFixed(1)}g &rarr; ${parseFloat(h.yield).toFixed(1)}g, ${parseFloat(h.strength).toFixed(2)}%</span>
                                        </div>
                                        <button onclick="deleteRecipe(${h.id})" class="text-red-300 hover:text-red-500 p-2 transition" aria-label="Delete Archived Recipe">
                                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                                        </button>
                                    </div>
                                `).join('')}
                            </div>
                        </details>
                    ` : ''}
                `;
                container.appendChild(block);
            }
        }

        function assignProgram(recipeId) {
            let prog = document.getElementById(`assign-${recipeId}`).value;
            if(!prog) return alert("Select a program to assign to.");
            let recipe = recipes.find(r => r.id == recipeId);
            for(let p in programs) {
                if(programs[p]) {
                    let r = recipes.find(x => x.id == programs[p]);
                    if(r && r.coffee === recipe.coffee && p !== prog) programs[p] = null; 
                }
            }
            programs[prog] = recipeId;
            saveData();
            switchView('home', 'Machine Programs');
        }

        // --- Quick Calc Logic ---
        function runQuickCalc() {
            let d = parseFloat(document.getElementById('qc-dose').value);
            let y = parseFloat(document.getElementById('qc-yield').value);
            let s = parseFloat(document.getElementById('qc-strength').value);
            let ts = parseFloat(document.getElementById('qc-t-str').value) || 9.30;
            let tt = parseFloat(document.getElementById('qc-t-tds').value) || 4.41;

            if(d && y && s) {
                let res = calculateDialIn(d, y, s, ts, tt);
                document.getElementById('qc-res-tds').innerText = res.actualTds;
                document.getElementById('qc-res-ext').innerText = res.actualExt + "%";
                document.getElementById('qc-res-rdose').innerText = res.recDose + "g";
                document.getElementById('qc-res-ryield').innerText = res.recYield + "g";
            } else {
                document.getElementById('qc-res-tds').innerText = "-";
                document.getElementById('qc-res-ext').innerText = "-";
                document.getElementById('qc-res-rdose').innerText = "-";
                document.getElementById('qc-res-ryield').innerText = "-";
            }
        }

        function setText(tds, str, targetTds, targetStr){
            document.getElementById(targetTds).value = tds;
            document.getElementById(targetStr).value = str; 
        }

        // Init - Read from local storage as baseline
        renderHome();
    </script>
</body>
</html>
